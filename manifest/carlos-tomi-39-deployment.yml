apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-productos-deployment
  namespace: carlostomi-pedidos-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ms-productos
  template:
    metadata:
      labels:
        app: ms-productos
    spec:
      containers:
      - name: ms-productos
        image: carlostomi/ms-productos:1.0
        ports:
        - containerPort: 8081
        env:
        - name: SERVER_PORT
          valueFrom: { configMapKeyRef: { name: ms-productos-config, key: SERVER_PORT } }
        - name: DB_HOST
          valueFrom: { configMapKeyRef: { name: ms-productos-config, key: DB_HOST } }
        - name: DB_NAME
          valueFrom: { configMapKeyRef: { name: ms-productos-config, key: DB_NAME } }
        - name: DB_USER
          valueFrom: { secretKeyRef: { name: ms-pedidos-secret, key: username } }
        - name: DB_PASSWORD
          valueFrom: { secretKeyRef: { name: ms-pedidos-secret, key: password } }